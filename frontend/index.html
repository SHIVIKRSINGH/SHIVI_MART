<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiviMart - Fresh Groceries Delivered</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            color: #2d3748;
        }

        /* Header */
        .header {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #10b981;
        }

        .cart-btn {
            position: relative;
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-badge {
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        /* Categories */
        .categories-section {
            background: white;
            border-bottom: 1px solid #e5e7eb;
        }

        .categories {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            overflow-x: auto;
        }

        .category-chip {
            padding: 8px 16px;
            background: #f3f4f6;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .category-chip:hover {
            background: #e5e7eb;
        }

        .category-chip.active {
            background: #d1fae5;
            color: #065f46;
            border-color: #10b981;
        }

        /* Products Grid */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* Product Card */
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.12);
        }

        /* Image Gallery */
        .product-images {
            position: relative;
            width: 100%;
            height: 220px;
            background: #f9fafb;
            overflow: hidden;
        }

        .image-slider {
            display: flex;
            transition: transform 0.3s ease;
            height: 100%;
        }

        .product-image {
            min-width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-nav {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
        }

        .image-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.3s;
        }

        .image-dot.active {
            background: white;
            width: 20px;
            border-radius: 4px;
        }

        .stock-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .stock-badge.in-stock {
            background: #d1fae5;
            color: #065f46;
        }

        .stock-badge.low-stock {
            background: #fed7aa;
            color: #92400e;
        }

        .stock-badge.out-of-stock {
            background: #fee2e2;
            color: #991b1b;
        }

        .discount-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #ef4444;
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
        }

        /* Product Info */
        .product-info {
            padding: 16px;
        }

        .product-category {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1f2937;
        }

        .product-description {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 12px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price-section {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 16px;
        }

        .price {
            font-size: 24px;
            font-weight: 700;
            color: #10b981;
        }

        .original-price {
            font-size: 16px;
            color: #9ca3af;
            text-decoration: line-through;
        }

        .unit {
            font-size: 14px;
            color: #6b7280;
        }

        /* Quantity Controls */
        .quantity-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
        }

        .qty-btn {
            width: 36px;
            height: 36px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            color: #6b7280;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover {
            border-color: #10b981;
            color: #10b981;
        }

        .qty-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .qty-input {
            flex: 1;
            text-align: center;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px;
            font-size: 16px;
            font-weight: 600;
            min-width: 60px;
        }

        .qty-input:focus {
            outline: none;
            border-color: #10b981;
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .add-to-cart-btn:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .add-to-cart-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #9ca3af;
        }

        .empty-state p {
            font-size: 18px;
            margin-top: 16px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: #9ca3af;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 16px;
            }

            .product-images {
                height: 180px;
            }

            .product-name {
                font-size: 14px;
            }

            .price {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <div class="logo">🛒 ShiviMart</div>
            <button class="cart-btn" onclick="openCart()">
                🛒 Cart
                <span class="cart-badge" id="cart-count">0</span>
            </button>
        </div>
    </div>

    <!-- Categories -->
    <div class="categories-section">
        <div class="categories" id="categories-container">
            <div class="category-chip active" onclick="filterByCategory('all')">All Products</div>
        </div>
    </div>

    <!-- Products -->
    <div class="container">
        <div class="products-grid" id="products-container">
            <div class="loading">Loading products...</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://shivimart.softgensys.com/api';
        let allProducts = [];
        let categories = [];
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');

        // Load data on page load
        window.addEventListener('load', () => {
            loadCategories();
            loadProducts();
            updateCartCount();
        });

        // Load Categories
        async function loadCategories() {
            try {
                const response = await fetch(`${API_URL}/categories`);
                const data = await response.json();
                categories = data.categories || [];
                renderCategories();
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        function renderCategories() {
            const container = document.getElementById('categories-container');
            const categoriesHTML = categories.map(cat => `
                <div class="category-chip" onclick="filterByCategory('${cat.slug}')">
                    ${cat.name}
                </div>
            `).join('');
            
            container.innerHTML = `
                <div class="category-chip active" onclick="filterByCategory('all')">All Products</div>
                ${categoriesHTML}
            `;
        }

        // Load Products
        async function loadProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '<div class="loading">Loading products...</div>';
            
            try {
                const response = await fetch(`${API_URL}/products`);
                const data = await response.json();
                allProducts = data.products || [];
                renderProducts(allProducts);
            } catch (error) {
                container.innerHTML = '<div class="empty-state"><p>❌ Error loading products</p></div>';
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('products-container');
            
            if (products.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>📦 No products found</p></div>';
                return;
            }
            
            container.innerHTML = products.map(product => createProductCard(product)).join('');
        }

        function createProductCard(product) {
            const images = [product.image_url, product.image_url_2, product.image_url_3].filter(Boolean);
            const hasDiscount = product.discount_percentage > 0;
            const discountedPrice = hasDiscount ? (product.price * (1 - product.discount_percentage / 100)).toFixed(2) : product.price;
            
            // Stock status
            let stockBadge = '';
            let stockClass = '';
            if (product.stock_quantity === 0) {
                stockBadge = 'OUT OF STOCK';
                stockClass = 'out-of-stock';
            } else if (product.stock_quantity < 10) {
                stockBadge = 'LOW STOCK';
                stockClass = 'low-stock';
            } else {
                stockBadge = 'IN STOCK';
                stockClass = 'in-stock';
            }

            return `
                <div class="product-card">
                    <div class="product-images">
                        ${images.length > 0 ? `
                            <div class="image-slider" id="slider-${product.id}">
                                ${images.map(img => `
                                    <img src="${img}" alt="${product.name}" class="product-image" onerror="this.src='https://via.placeholder.com/280x220?text=No+Image'">
                                `).join('')}
                            </div>
                            ${images.length > 1 ? `
                                <div class="image-nav">
                                    ${images.map((_, index) => `
                                        <div class="image-dot ${index === 0 ? 'active' : ''}" onclick="changeImage(${product.id}, ${index})"></div>
                                    `).join('')}
                                </div>
                            ` : ''}
                        ` : `
                            <img src="https://via.placeholder.com/280x220?text=No+Image" alt="${product.name}" class="product-image">
                        `}
                        <div class="stock-badge ${stockClass}">${stockBadge}</div>
                        ${hasDiscount ? `<div class="discount-badge">${product.discount_percentage}% OFF</div>` : ''}
                    </div>
                    
                    <div class="product-info">
                        <div class="product-category">${product.category_name || 'Uncategorized'}</div>
                        <div class="product-name">${product.name}</div>
                        ${product.description ? `<div class="product-description">${product.description}</div>` : ''}
                        
                        <div class="price-section">
                            <span class="price">₹${discountedPrice}</span>
                            ${hasDiscount ? `<span class="original-price">₹${product.price}</span>` : ''}
                            <span class="unit">/ ${product.unit}</span>
                        </div>
                        
                        ${product.stock_quantity > 0 ? `
                            <div class="quantity-controls">
                                <button class="qty-btn" onclick="decrementQty(${product.id}, '${product.unit}')">−</button>
                                <input type="number" class="qty-input" id="qty-${product.id}" value="${getDefaultQty(product.unit)}" step="${getQtyStep(product.unit)}" min="${getMinQty(product.unit)}" max="${product.stock_quantity}" onchange="validateQty(${product.id}, ${product.stock_quantity}, '${product.unit}')">
                                <button class="qty-btn" onclick="incrementQty(${product.id}, ${product.stock_quantity}, '${product.unit}')">+</button>
                            </div>
                            <button class="add-to-cart-btn" onclick="addToCart(${product.id}, '${product.name}', ${discountedPrice}, '${product.unit}', '${images[0] || ''}')">
                                Add to Cart
                            </button>
                        ` : `
                            <button class="add-to-cart-btn" disabled>Out of Stock</button>
                        `}
                    </div>
                </div>
            `;
        }

        // Image Slider
        function changeImage(productId, index) {
            const slider = document.getElementById(`slider-${productId}`);
            const dots = slider.parentElement.querySelectorAll('.image-dot');
            
            slider.style.transform = `translateX(-${index * 100}%)`;
            
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        // Quantity Functions
        function getDefaultQty(unit) {
            if (unit === 'kg') return 0.5;
            if (unit === 'gram') return 100;
            return 1;
        }

        function getQtyStep(unit) {
            if (unit === 'kg') return 0.5;
            if (unit === 'gram') return 100;
            return 1;
        }

        function getMinQty(unit) {
            if (unit === 'kg') return 0.5;
            if (unit === 'gram') return 100;
            return 1;
        }

        function incrementQty(productId, maxStock, unit) {
            const input = document.getElementById(`qty-${productId}`);
            const step = getQtyStep(unit);
            const newValue = parseFloat(input.value) + step;
            
            if (newValue <= maxStock) {
                input.value = newValue;
            }
        }

        function decrementQty(productId, unit) {
            const input = document.getElementById(`qty-${productId}`);
            const step = getQtyStep(unit);
            const min = getMinQty(unit);
            const newValue = parseFloat(input.value) - step;
            
            if (newValue >= min) {
                input.value = newValue;
            }
        }

        function validateQty(productId, maxStock, unit) {
            const input = document.getElementById(`qty-${productId}`);
            const value = parseFloat(input.value);
            const min = getMinQty(unit);
            
            if (isNaN(value) || value < min) {
                input.value = min;
            } else if (value > maxStock) {
                input.value = maxStock;
                alert(`⚠️ Maximum available quantity is ${maxStock} ${unit}`);
            }
        }

        // Cart Functions
        function addToCart(productId, name, price, unit, image) {
            const qtyInput = document.getElementById(`qty-${productId}`);
            const quantity = parseFloat(qtyInput.value);
            
            const existingItem = cart.find(item => item.productId === productId);
            
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push({ productId, name, price, unit, quantity, image });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            
            // Show feedback
            alert(`✅ Added ${quantity} ${unit} of ${name} to cart!`);
        }

        function updateCartCount() {
            const count = cart.reduce((total, item) => total + item.quantity, 0);
            document.getElementById('cart-count').textContent = Math.round(count);
        }

        function openCart() {
            // Redirect to cart page or open cart modal
            alert('Cart functionality - integrate with your cart page!');
            console.log('Cart items:', cart);
        }

        // Filter by Category
        function filterByCategory(slug) {
            // Update active state
            document.querySelectorAll('.category-chip').forEach(chip => {
                chip.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Filter products
            if (slug === 'all') {
                renderProducts(allProducts);
            } else {
                const category = categories.find(c => c.slug === slug);
                if (category) {
                    const filtered = allProducts.filter(p => p.category_id === category.id);
                    renderProducts(filtered);
                }
            }
        }
    </script>
</body>
</html>
